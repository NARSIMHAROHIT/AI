
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Job 1 — fast sanity check: every Python file must at least compile.
  # Catches syntax errors in seconds, before the slow job spends minutes.
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Compile all Python files
        run: python -m compileall -q . && echo "All files compile"

  # Job 2 — full pipeline check: rebuild the RAG index from scratch and
  # verify retrieval finds known content. No API key needed — retrieval
  # is fully local; only answer generation needs Groq.
  rag-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install CPU-only torch first (avoids the 2GB CUDA build)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Ingest documents
        run: cd 03-rag-assistant && python ingest.py
      - name: Test retrieval finds the right chunk
        run: |
          cd 03-rag-assistant
          python - <<'EOF'
          from ask import retrieve

          # This query targets content we KNOW is in the current knowledge
          # base (the holdout method, from ML_UNIT_4 notes.pdf). If the
          # docs change again, update this query to match what's in them.
          chunks = retrieve("What is the holdout method for evaluating a classifier?")
          assert chunks, "retrieval returned nothing"
          text = " ".join(c["text"] for c in chunks)
          assert "holdout" in text.lower(), "expected holdout-method chunk in results"
          print(f"Retrieval OK: {len(chunks)} chunks, sources:",
                sorted({c['source'] for c in chunks}))
          EOF